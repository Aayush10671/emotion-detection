<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #000;
        }
        .card {
            background: #fff;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 0 60px rgba(106, 17, 203, 0.35);
            width: 100%;
            max-width: 480px;
        }
        h1 {
            margin-top: 0;
            font-size: 1.6rem;
            color: #222;
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #444;
        }
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            resize: vertical;
            font-family: inherit;
        }
        textarea:focus {
            outline: none;
            border-color: #6a11cb;
            box-shadow: 0 0 0 3px rgba(106,17,203,0.15);
        }
        input[type="submit"] {
            margin-top: 1rem;
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            background: #6a11cb;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        input[type="submit"]:hover {
            background: #2575fc;
        }
        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .happy {
            background: #e6f9ec;
            color: #1a7f37;
        }
        .sad {
            background: #fdeaea;
            color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Sentiment Analysis</h1>
        <form action="/predict" method="post">
            <label for="text">Enter text to analyze:</label>
            <textarea id="text" name="text" placeholder="Type something...">{{ request.form.text if request.form.text else '' }}</textarea>
            <input type="submit" value="Analyze Sentiment">
        </form>

        {% if result is not none %}
            {% if result == 1 %}
                <div class="result happy">😊 Predicted sentiment: Happy</div>
            {% else %}
                <div class="result sad">😔 Predicted sentiment: Sad</div>
            {% endif %}
        {% endif %}
    </div>
</body>
</html>
